databases:
  - name: exceptioniq-db
    databaseName: exceptioniq
    user: exceptioniq
    region: singapore
    plan: free

services:
  # --- Django Backend API ---
  - type: web
    name: exceptioniq-backend
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install --prefer-binary -r requirements.txt
    startCommand: cd backend && python manage.py migrate --noinput && if [ "$RUN_SEED" = "true" ]; then python manage.py seed_db; fi && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exceptioniq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SAMESITE
        value: "None"
      - key: CSRF_COOKIE_SECURE
        value: "1"
      - key: RUN_SEED
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        value: ""
      - key: FRONTEND_ORIGIN
        value: ""

  # --- FastAPI AI Service ---
  - type: web
    name: exceptioniq-ai
    env: python
    region: singapore
    plan: free
    buildCommand: cd ai_service && pip install --prefer-binary -r requirements.txt
    startCommand: cd ai_service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
