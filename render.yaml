# Render Blueprint — https://render.com/docs/blueprint-spec
# After pushing to GitHub, connect this repo in the Render dashboard.
# Render will auto-detect this file and provision all resources.

databases:
  - name: exceptioniq-db
    databaseName: exceptioniq
    user: exceptioniq
    region: singapore
    plan: free

services:
  # --- Django Backend API ---
  - type: web
    name: exceptioniq-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exceptioniq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SAMESITE
        value: "None"
      - key: CSRF_COOKIE_SECURE
        value: "1"
      - key: RUN_SEED
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        value: ""     # Set to AI service URL after deploy
      - key: FRONTEND_ORIGIN
        value: ""     # Set to frontend URL after deploy

  # --- FastAPI AI Service ---
  - type: web
    name: exceptioniq-ai
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: GROQ_API_KEY
        sync: false

  # --- Frontend Static Site ---
  - type: static
    name: exceptioniq-frontend
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: ""     # Set to https://your-backend.onrender.com/api/v1
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
